<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지방재정관리시스템</title>
<style>
    body {
        margin: 0;
        font-family: 'Malgun Gothic', sans-serif;
        font-size: 12px;
        background-color: #f0f2f5;
        color: #333;
    }
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #fff;
        padding: 10px 20px;
        border-bottom: 1px solid #ddd;
    }
    .header-logo {
        font-size: 16px;
        font-weight: bold;
    }
    .header-logo span {
        color: #d32f2f;
    }
    .header-info {
        display: flex;
        align-items: center;
        gap: 15px;
    }
    .main-container {
        display: flex;
        height: calc(100vh - 45px);
    }
    .sidebar {
        width: 220px;
        background-color: #f8f9fa;
        border-right: 1px solid #ddd;
        display: flex;
    }
    .sidebar-icons {
        width: 60px;
        background-color: #1e3a8a;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 10px;
    }
    .sidebar-menu {
        flex-grow: 1;
        padding: 10px;
    }
    .menu-item {
        padding: 8px;
        cursor: pointer;
    }
    .menu-item.active {
        background-color: #e0e7ff;
        font-weight: bold;
        color: #1e3a8a;
    }
    .content-area {
        flex-grow: 1;
        background-color: #fff;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
    }
    .tabs {
        display: flex;
        background-color: #f1f3f5;
        border-bottom: 1px solid #ddd;
    }
    .tab {
        padding: 10px 20px;
        border-right: 1px solid #ddd;
        cursor: pointer;
    }
    .tab.active {
        background-color: #fff;
        font-weight: bold;
        border-top: 2px solid #1e3a8a;
    }
    .page-content {
        padding: 20px;
    }
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }
    .page-title {
        font-size: 18px;
        font-weight: bold;
    }
    .btn-group button {
        padding: 5px 10px;
        margin-left: 5px;
        border: 1px solid #ccc;
        background-color: #fff;
        cursor: pointer;
        font-size: 12px;
    }
    .section {
        border: 1px solid #ddd;
        margin-bottom: 20px;
    }
    .section-title {
        background-color: #f8f9fa;
        padding: 8px 10px;
        font-weight: bold;
        border-bottom: 1px solid #ddd;
    }
    .form-table {
        width: 100%;
        border-collapse: collapse;
    }
    .form-table th, .form-table td {
        border: 1px solid #eee;
        padding: 6px 8px;
    }
    .form-table th {
        background-color: #f8f9fa;
        text-align: right;
        width: 150px;
        font-weight: normal;
        font-size: 12px;
    }
    .form-table td {
        background-color: #fff;
        font-size: 12px;
    }
    /* 입력 양식 폰트 크기를 레이블과 동일하게 12px로 고정 */
    input[type="text"], input[type="date"], select, textarea {
        width: 95%;
        padding: 4px;
        border: 1px solid #ccc;
        font-size: 12px;
        font-family: inherit;
        box-sizing: border-box;
    }
    input[type="radio"], input[type="checkbox"] {
        vertical-align: middle;
        margin-right: 3px;
    }
    textarea {
        height: 60px;
        resize: vertical;
    }
    .inner-tabs {
        display: flex;
        border-bottom: 1px solid #1e3a8a;
        margin-bottom: 10px;
    }
    .inner-tab {
        padding: 8px 15px;
        border: 1px solid #ddd;
        border-bottom: none;
        background-color: #f8f9fa;
        cursor: pointer;
        margin-right: 2px;
    }
    .inner-tab.active {
        background-color: #fff;
        border: 1px solid #1e3a8a;
        border-bottom: 1px solid #fff;
        font-weight: bold;
        margin-bottom: -1px;
    }
    .footer-buttons {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
        border-top: 1px solid #ddd;
        padding-top: 15px;
        padding-bottom: 30px;
    }
    .btn-primary {
        background-color: #2563eb;
        color: white;
        border: none;
        padding: 8px 25px;
        cursor: pointer;
        font-weight: bold;
        font-size: 13px;
    }
    .required { color: red; margin-right: 3px; }
    .bg-yellow { background-color: #fff9c4 !important; }
</style>
</head>
<body>

<header>
    <div class="header-logo">지방재정관리시스템 <span>교육서버</span></div>
    <div class="header-info">
        <span>회계연도 
            <select style="width: 70px;">
                <option>2024</
